name: enterprise_flutter_app
description: Enterprise-grade Flutter application with Clean Architecture, Riverpod, Go Router, Dio, and Hive.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.10.0
  connectivity_plus: ^6.0.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # File Handling
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  cross_file: ^0.3.5

  # Location
  geolocator: ^11.0.0

  # Responsive & Adaptive
  responsive_framework: ^1.4.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  iconsax: ^0.0.8
  flutter_map: ^8.3.1
  vector_map_tiles: ^10.0.0-beta.2
  vector_tile_renderer: ^7.0.0-beta.1
  latlong2: ^0.9.1

  # Config
  flutter_dotenv: ^5.1.0

  # Utility
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  intl: ^0.20.2
  logger: ^2.3.0
  equatable: ^2.0.5
  fpdart: ^1.1.0

  # Form
  formz: ^0.8.0

  # Animation
  animations: ^2.0.11

  # Splash
  flutter_native_splash: ^2.4.0
  smooth_page_indicator: ^2.0.1

  # Firebase
  firebase_core: ^2.28.0
  firebase_messaging: ^14.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

  generate: true
